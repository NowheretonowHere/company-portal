<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 助手 - 公司内部系统</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo-sm">LOGO</span>
      <span class="brand-name">公司内部系统</span>
    </div>
    <nav class="topbar-nav" id="topbar-nav">
      <a href="/dashboard.html" class="nav-link">仪表板</a>
      <a href="/chat.html" class="nav-link active">AI 助手</a>
    </nav>
    <div class="topbar-right">
      <span class="user-name" id="user-name">加载中...</span>
      <button id="logout-btn" class="btn-logout">退出登录</button>
    </div>
  </header>

  <div class="chat-layout">
    <!-- 侧边栏 -->
    <aside class="chat-sidebar">
      <div class="chat-sidebar-header">
        <button id="new-chat-btn" class="btn-primary" style="width:100%;">+ 新对话</button>
      </div>
      <div class="chat-sidebar-list" id="conversation-list">
        <div style="text-align:center;color:var(--text-light);padding:20px;font-size:13px;">暂无对话</div>
      </div>
    </aside>

    <!-- 主聊天区 -->
    <section class="chat-main">
      <div class="chat-main-header" id="chat-header">
        <span id="chat-title-text">AI 助手</span>
        <div style="display:flex;align-items:center;gap:12px;">
          <span id="usage-remaining" class="usage-remaining" title="今日剩余调用次数">剩余 50 次</span>
          <select id="model-select" class="model-select" title="选择模型"></select>
          <button id="export-btn" class="btn-export" title="导出对话为 Markdown" style="display:none;">📥 导出</button>
        </div>
      </div>

      <div class="chat-messages" id="chat-messages">
        <div class="chat-empty" id="chat-empty">
          <div class="chat-empty-icon">&#x1f4ac;</div>
          <div>选择或创建一个对话开始聊天</div>
        </div>
      </div>

      <!-- 加载指示器 -->
      <div id="chat-loading" class="chat-loading" style="display:none;padding:4px 20px;">
        <span>AI 正在思考</span>
        <span class="chat-loading-dot"></span>
        <span class="chat-loading-dot"></span>
        <span class="chat-loading-dot"></span>
      </div>

      <div id="file-preview" class="file-preview" style="display:none"></div>
      <div class="chat-input-area">
        <input type="file" id="file-input" style="display:none" accept="image/*,.pdf,.txt,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.csv,.json,.md">
        <button id="attach-btn" class="chat-attach-btn" title="上传文件">+</button>
        <textarea id="chat-input" class="chat-input" rows="1" placeholder="输入消息，Enter 发送，Shift+Enter 换行，Ctrl+V 粘贴图片" disabled></textarea>
        <span id="model-label" class="model-label" title="当前使用的模型"></span>
        <button id="send-btn" class="chat-send-btn" disabled>发送</button>
        <button id="stop-btn" class="chat-stop-btn" style="display:none" title="停止生成">停止</button>
      </div>
    </section>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.href = '/login.html';
    }

    let conversations = [];
    let currentConversationId = null;
    let isLoading = false;
    let abortController = null;
    let modelList = [];
    let isAdmin = false;

    const convListEl = document.getElementById('conversation-list');
    const chatMessagesEl = document.getElementById('chat-messages');
    const chatEmptyEl = document.getElementById('chat-empty');
    const chatInputEl = document.getElementById('chat-input');
    const sendBtnEl = document.getElementById('send-btn');
    const stopBtnEl = document.getElementById('stop-btn');
    const chatLoadingEl = document.getElementById('chat-loading');
    const chatTitleEl = document.getElementById('chat-title-text');
    const usageRemainingEl = document.getElementById('usage-remaining');
    const modelLabelEl = document.getElementById('model-label');
    const newChatBtn = document.getElementById('new-chat-btn');
    const modelSelectEl = document.getElementById('model-select');
    const fileInputEl = document.getElementById('file-input');
    const attachBtnEl = document.getElementById('attach-btn');
    const filePreviewEl = document.getElementById('file-preview');
    let selectedModel = '';
    let pendingFiles = [];

    // 加载模型列表
    async function loadModels() {
      try {
        const res = await fetch('/api/models', { headers: { 'Authorization': token } });
        const data = await res.json();
        if (data.success && data.models.length > 0) {
          modelList = data.models;
          selectedModel = modelList[0].id;
          modelSelectEl.innerHTML = modelList.map(m =>
            `<option value="${m.id}">${m.name || m.id}</option>`
          ).join('');
          modelSelectEl.value = selectedModel;
          updateModelLabel();
        }
      } catch (err) { console.error('加载模型失败', err); }
    }

    function updateModelLabel() {
      const model = modelList.find(m => m.id === selectedModel);
      if (model) {
        modelLabelEl.textContent = `当前模型：${model.name || model.id}`;
      }
    }

    async function loadRemaining() {
      try {
        const res = await fetch('/api/usage/remaining', { headers: { 'Authorization': token } });
        const data = await res.json();
        if (data.success) {
          updateRemainingDisplay(data.remaining, data.limit);
        }
      } catch (err) { /* 忽略 */ }
    }

    function updateRemainingDisplay(remaining, limit) {
      usageRemainingEl.textContent = `剩余 ${remaining}/${limit} 次`;
      if (remaining <= 5) {
        usageRemainingEl.style.color = 'var(--error)';
      } else if (remaining <= 15) {
        usageRemainingEl.style.color = 'var(--accent)';
      } else {
        usageRemainingEl.style.color = '';
      }
    }

    modelSelectEl.addEventListener('change', () => {
      selectedModel = modelSelectEl.value;
      updateModelLabel();
    });

    // 文件上传
    attachBtnEl.addEventListener('click', () => fileInputEl.click());

    fileInputEl.addEventListener('change', () => {
      for (const file of fileInputEl.files) {
        if (pendingFiles.length >= 10) { alert('最多上传10个文件'); break; }
        pendingFiles.push(file);
      }
      fileInputEl.value = '';
      renderFilePreview();
    });

    // 拖拽上传
    const chatMain = document.querySelector('.chat-main');
    chatMain.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.stopPropagation();
    });
    chatMain.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (isLoading) return;
      const files = e.dataTransfer?.files;
      if (!files) return;
      for (const file of files) {
        if (pendingFiles.length >= 10) { alert('最多上传10个文件'); break; }
        pendingFiles.push(file);
      }
      renderFilePreview();
    });

    // 粘贴图片支持
    document.addEventListener('paste', (e) => {
      if (isLoading) return;
      // 只在聊天区域响应粘贴
      if (!e.target.closest('.chat-main') && !e.target.closest('.chat-input-area')) return;
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const file = item.getAsFile();
          if (file && pendingFiles.length < 10) {
            pendingFiles.push(file);
            renderFilePreview();
          }
        }
      }
    });

    function renderFilePreview() {
      if (pendingFiles.length === 0) {
        filePreviewEl.style.display = 'none';
        filePreviewEl.innerHTML = '';
        return;
      }
      filePreviewEl.style.display = 'flex';
      filePreviewEl.innerHTML = pendingFiles.map((f, i) => {
        const isImage = f.type.startsWith('image/');
        let preview;
        if (isImage) {
          const objectUrl = URL.createObjectURL(f);
          // 清理旧 URL 防内存泄漏
          const oldUrl = f._objectUrl;
          if (oldUrl) URL.revokeObjectURL(oldUrl);
          f._objectUrl = objectUrl;
          preview = `<img src="${objectUrl}" class="file-thumb-img">`;
        } else {
          const ext = (f.name || '').split('.').pop().toUpperCase();
          preview = `<span class="file-thumb-icon">${ext || 'FILE'}</span>`;
        }
        return `
          <span class="file-thumb">
            ${preview}
            <button class="file-thumb-remove" title="移除"
              onclick="event.preventDefault();event.stopPropagation();removeFile(${i});">&times;</button>
            <span class="file-thumb-name">${escapeHtml(f.name)}</span>
          </span>`;
      }).join('');
    }

    function removeFile(index) {
      const f = pendingFiles[index];
      if (f._objectUrl) URL.revokeObjectURL(f._objectUrl);
      pendingFiles.splice(index, 1);
      renderFilePreview();
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + 'B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + 'KB';
      return (bytes / 1048576).toFixed(1) + 'MB';
    }

    async function uploadFiles() {
      if (pendingFiles.length === 0) return [];
      const formData = new FormData();
      pendingFiles.forEach(f => formData.append('files', f));
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Authorization': token },
        body: formData
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      return data.files;
    }

    // 初始化
    async function init() {
      try {
        const res = await fetch('/api/me', { headers: { 'Authorization': token } });
        if (!res.ok) { logout(); return; }
        const data = await res.json();
        document.getElementById('user-name').textContent = data.user.username;

        if (data.user.role === 'admin') {
          isAdmin = true;
          document.getElementById('topbar-nav').innerHTML =
            '<a href="/dashboard.html" class="nav-link">仪表板</a>' +
            '<a href="/chat.html" class="nav-link active">AI 助手</a>' +
            '<a href="/admin.html" class="nav-link">用户管理</a>';
        }
      } catch (err) { logout(); }

      // 加载模型列表
      await loadModels();

      // 加载剩余调用次数
      await loadRemaining();

      // 启用输入
      chatInputEl.disabled = false;
      sendBtnEl.disabled = false;

      await loadConversations();

      // 检查URL参数
      const params = new URLSearchParams(window.location.search);
      const convId = params.get('id');
      if (convId) {
        await selectConversation(parseInt(convId));
      }
    }

    async function loadConversations() {
      try {
        const url = isAdmin ? '/api/conversations?all=true' : '/api/conversations';
        const res = await fetch(url, { headers: { 'Authorization': token } });
        const data = await res.json();
        if (data.success) {
          conversations = data.conversations;
          renderConversationList();
        }
      } catch (err) {
        console.error('加载对话列表失败', err);
      }
    }

    function renderConversationList() {
      if (conversations.length === 0) {
        convListEl.innerHTML = '<div style="text-align:center;color:var(--text-light);padding:20px;font-size:13px;">暂无对话</div>';
        return;
      }

      convListEl.innerHTML = conversations.map(c => {
        const userNameTag = isAdmin && c.userName
          ? `<span class="conv-user">${escapeHtml(c.userName)}</span>`
          : '';
        return `
        <div class="chat-conversation-item ${c.id === currentConversationId ? 'active' : ''}"
             onclick="selectConversation(${c.id})">
          <span class="conv-title" title="${escapeHtml(c.title)}">${escapeHtml(c.title)}</span>
          ${userNameTag}
          <span class="conv-date">${formatDate(c.updatedAt)}</span>
          <button class="conv-delete" title="删除对话"
                  onclick="event.stopPropagation();deleteConversation(${c.id})">&times;</button>
        </div>
      `}).join('');
    }

    async function selectConversation(convId) {
      currentConversationId = convId;
      renderConversationList();

      try {
        const res = await fetch(`/api/conversations/${convId}`, { headers: { 'Authorization': token } });
        const data = await res.json();

        if (!data.success) {
          alert(data.message);
          return;
        }

        chatTitleEl.textContent = data.conversation.title;
        chatEmptyEl.style.display = 'none';
        document.getElementById('export-btn').style.display = '';
        const convInfo = conversations.find(c => c.id === convId);
        renderMessages(data.messages, convInfo ? convInfo.userName : null);

        // 更新URL
        history.replaceState(null, '', `?id=${convId}`);
      } catch (err) {
        console.error('加载对话失败', err);
      }
    }

    function renderContent(content) {
      // 先转义 HTML 防 XSS
      let html = escapeHtml(content);

      // Markdown 图片: ![alt](url)
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, url) => {
        let imgHtml = `<img src="${url}" alt="${alt}" class="chat-msg-img" onclick="viewImage('${url}')" loading="lazy">`;
        // AI 生成的图片添加复制/下载按钮
        imgHtml += `<div class="img-actions"><button class="img-action-btn" onclick="event.stopPropagation();copyImage('${url}')" title="复制图片">📋</button><button class="img-action-btn" onclick="event.stopPropagation();downloadImage('${url}')" title="下载图片">⬇</button></div>`;
        return imgHtml;
      });

      // 引用块: > text（支持多行，转换为可点击跳转的引用）
      html = html.replace(/^&gt; (.+)$/gm, '<blockquote class="chat-blockquote">$1</blockquote>');

      // 普通换行
      html = html.replace(/\n/g, '<br>');

      return html;
    }

    function viewImage(url) {
      const overlay = document.createElement('div');
      overlay.className = 'img-lightbox';
      const img = document.createElement('img');
      img.src = url;
      img.addEventListener('click', () => overlay.remove());
      overlay.appendChild(img);
      overlay.addEventListener('click', () => overlay.remove());
      document.body.appendChild(overlay);
    }

    function renderMessages(messages, convUserName) {
      chatMessagesEl.innerHTML = messages.map(m =>
        renderMessageHTML(m, convUserName)
      ).join('');
      scrollToBottom();
    }

    function getAvatar(role, isUserMsg) {
      if (role === 'assistant') return '<div class="chat-message-avatar avatar-ai">🤖</div>';
      const initial = (localStorage.getItem('userName') || 'U')[0];
      return `<div class="chat-message-avatar avatar-user">${escapeHtml(initial)}</div>`;
    }

    function getUserLabel(role, convUserName) {
      if (role === 'user' && convUserName) {
        return `<div class="chat-msg-user-label">${escapeHtml(convUserName)}</div>`;
      }
      return '';
    }

    async function sendMessage() {
      const message = chatInputEl.value.trim();
      const hasFiles = pendingFiles.length > 0;
      if (!message && !hasFiles) return;
      if (isLoading) return;

      // 检查图片与模型兼容性
      const hasImages = pendingFiles.some(f => f.type.startsWith('image/'));
      if (hasImages) {
        const modelInfo = modelList.find(m => m.id === selectedModel);
        if (modelInfo && !modelInfo.supportsImages) {
          if (!confirm('当前模型不支持图片输入，请切换到支持图片的模型或移除图片。\n\n点击"确定"将以纯文本方式发送，点击"取消"停止发送。')) {
            return;
          }
        }
      }

      // 立即清空输入框
      chatInputEl.value = '';
      chatInputEl.style.height = 'auto';

      // 乐观渲染：立即显示用户消息
      chatEmptyEl.style.display = 'none';
      const tempUserMsg = {
        role: 'user',
        content: message + (hasFiles ? ` [已选择${pendingFiles.length}个文件]` : ''),
        createdAt: new Date().toISOString().replace('T', ' ').substring(0, 19)
      };
      chatMessagesEl.insertAdjacentHTML('beforeend', renderMessageHTML(tempUserMsg));
      scrollToBottom();

      isLoading = true;
      abortController = new AbortController();
      chatInputEl.disabled = true;
      sendBtnEl.style.display = 'none';
      stopBtnEl.style.display = 'inline-block';
      attachBtnEl.disabled = true;
      showLoading();

      const isNewConversation = !currentConversationId;

      try {
        // 上传文件
        let uploadedFiles = [];
        if (hasFiles) {
          uploadedFiles = await uploadFiles();
        }

        // 构建消息内容（含文件信息）
        let fullMessage = message;
        if (uploadedFiles.length > 0) {
          const fileInfo = uploadedFiles.map(f => {
            if (f.type.startsWith('image/')) return `[图片: ${f.name}](/${f.path})`;
            return `[文件: ${f.name}](/${f.path})`;
          }).join('\n');
          fullMessage = fullMessage ? fullMessage + '\n' + fileInfo : fileInfo;
        }

        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': token },
          body: JSON.stringify({
            conversationId: currentConversationId || undefined,
            message: fullMessage,
            model: selectedModel
          }),
          signal: abortController.signal
        });

        const data = await res.json();

        if (!data.success) {
          // 移除乐观渲染的临时消息，显示错误
          chatMessagesEl.lastElementChild?.remove();
          chatMessagesEl.insertAdjacentHTML('beforeend',
            `<div class="chat-message chat-message-assistant"><div class="chat-message-bubble" style="color:var(--error);">❌ ${escapeHtml(data.message)}</div></div>`);
          scrollToBottom();
          // 更新剩余次数
          await loadRemaining();
          return;
        }

        // 更新剩余次数
        updateRemainingDisplay(data.remaining, 50);

        // 移除临时消息，渲染正式消息
        chatMessagesEl.lastElementChild?.remove();

        if (isNewConversation) {
          currentConversationId = data.conversationId;
          await loadConversations();
          chatMessagesEl.innerHTML =
            renderMessageHTML(data.userMessage) + renderMessageHTML(data.assistantMessage);
          chatTitleEl.textContent = Array.from(message).slice(0, 30).join('');
          history.replaceState(null, '', `?id=${data.conversationId}`);
        } else {
          chatMessagesEl.insertAdjacentHTML('beforeend',
            renderMessageHTML(data.userMessage) + renderMessageHTML(data.assistantMessage));
          await loadConversations();
          renderConversationList();
        }

        scrollToBottom();
      } catch (err) {
        if (err.name === 'AbortError') {
          // 用户主动停止，保留已发送的用户消息，不追加错误提示
          scrollToBottom();
        } else {
          chatMessagesEl.lastElementChild?.remove();
          chatMessagesEl.insertAdjacentHTML('beforeend',
            `<div class="chat-message chat-message-assistant"><div class="chat-message-bubble" style="color:var(--error);">❌ 网络错误，请检查连接后重试</div></div>`);
          scrollToBottom();
          console.error('发送失败', err);
        }
      } finally {
        isLoading = false;
        abortController = null;
        chatInputEl.disabled = false;
        sendBtnEl.style.display = 'inline-block';
        stopBtnEl.style.display = 'none';
        attachBtnEl.disabled = false;
        pendingFiles = [];
        renderFilePreview();
        hideLoading();
        chatInputEl.focus();
      }
    }

    function renderMessageHTML(msg, convUserName) {
      const isUser = msg.role === 'user';
      return `
        <div class="chat-message ${isUser ? 'chat-message-user' : 'chat-message-assistant'}">
          ${getAvatar(msg.role)}
          <div class="chat-message-body">
            ${getUserLabel(msg.role, convUserName)}
            <div class="chat-message-bubble-wrap">
              <div class="chat-message-bubble">${renderContent(msg.content)}</div>
              <button class="msg-quote-btn" title="引用回复" onclick="event.stopPropagation();quoteMessage(this)">↩</button>
            </div>
            <div class="chat-message-time">${formatTime(msg.createdAt)}</div>
          </div>
        </div>`;
    }

    async function deleteConversation(convId) {
      if (!confirm('确定要删除这个对话吗？')) return;

      try {
        const res = await fetch(`/api/conversations/${convId}`, {
          method: 'DELETE',
          headers: { 'Authorization': token }
        });
        const data = await res.json();

        if (data.success) {
          if (currentConversationId === convId) {
            // 切换到其他对话或显示空状态
            currentConversationId = null;
            chatMessagesEl.innerHTML = '';
            chatEmptyEl.style.display = 'flex';
            chatTitleEl.textContent = 'AI 助手';
            history.replaceState(null, '', '/chat.html');
          }
          await loadConversations();
        } else {
          alert(data.message);
        }
      } catch (err) {
        console.error('删除失败', err);
      }
    }

    // 新建对话
    newChatBtn.addEventListener('click', () => {
      currentConversationId = null;
      chatMessagesEl.innerHTML = '';
      chatEmptyEl.style.display = 'flex';
      chatTitleEl.textContent = '新对话';
      document.getElementById('export-btn').style.display = 'none';
      renderConversationList();
      history.replaceState(null, '', '/chat.html');
      chatInputEl.focus();
    });

    // 发送按钮
    sendBtnEl.addEventListener('click', sendMessage);

    // 停止生成按钮
    stopBtnEl.addEventListener('click', stopGeneration);

    function stopGeneration() {
      if (abortController) {
        abortController.abort();
      }
    }

    // Enter发送, Shift+Enter换行
    chatInputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // 自动调整输入框高度
    chatInputEl.addEventListener('input', () => {
      chatInputEl.style.height = 'auto';
      chatInputEl.style.height = Math.min(chatInputEl.scrollHeight, 120) + 'px';
    });

    // 滚动
    function scrollToBottom() {
      chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
    }

    function showLoading() {
      chatLoadingEl.style.display = 'flex';
      scrollToBottom();
    }

    function hideLoading() {
      chatLoadingEl.style.display = 'none';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr.replace(' ', 'T') + '+08:00');
      const now = new Date();
      if (d.toDateString() === now.toDateString()) {
        return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      }
      return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
    }

    function formatTime(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr.replace(' ', 'T') + '+08:00');
      return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function quoteMessage(btn) {
      const bubble = btn.closest('.chat-message-bubble-wrap').querySelector('.chat-message-bubble');
      const rawText = bubble.textContent.trim();
      const quoted = rawText.split('\n').map(line => '> ' + line).join('\n') + '\n';
      chatInputEl.value = quoted;
      chatInputEl.style.height = 'auto';
      chatInputEl.style.height = Math.min(chatInputEl.scrollHeight, 120) + 'px';
      chatInputEl.focus();
      scrollToBottom();
    }

    async function copyImage(url) {
      try {
        const res = await fetch(url);
        const blob = await res.blob();
        await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
        showMessageToast('图片已复制');
      } catch (e) {
        // 降级：复制 URL
        try { await navigator.clipboard.writeText(url); showMessageToast('图片 URL 已复制'); }
        catch (e2) { alert('复制失败，请右键保存图片'); }
      }
    }

    function downloadImage(url) {
      const ts = new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'ai_generated_' + ts + '.png';
      a.target = '_blank';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // 导出对话为 Markdown
    function exportConversation() {
      if (!currentConversationId) { alert('请先选择一个对话'); return; }
      const title = chatTitleEl.textContent.trim();
      const dateStr = new Date().toISOString().substring(0, 10);
      let md = '# ' + title + '\n\n';
      md += '> 导出时间: ' + new Date().toLocaleString('zh-CN') + '\n\n---\n\n';
      const msgEls = chatMessagesEl.querySelectorAll('.chat-message');
      msgEls.forEach(el => {
        const bubble = el.querySelector('.chat-message-bubble');
        const time = el.querySelector('.chat-message-time');
        const isUser = el.classList.contains('chat-message-user');
        const role = isUser ? '**用户**' : '**AI 助手**';
        const timeStr = time ? time.textContent.trim() : '';
        const rawText = bubble ? bubble.textContent.trim() : '';
        md += `### ${role} _${timeStr}_\n\n${rawText}\n\n`;
      });
      const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = title.replace(/[\/\\:*?"<>|]/g, '_') + '_' + dateStr + '.md';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showMessageToast('对话已导出');
    }

    document.getElementById('export-btn').addEventListener('click', exportConversation);

    function showMessageToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'chat-toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => { toast.classList.add('show'); }, 10);
      setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 1800);
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/login.html';
    }

    document.getElementById('logout-btn').addEventListener('click', logout);

    init();
  </script>
</body>
</html>
