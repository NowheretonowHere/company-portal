<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仪表板 - 公司内部系统</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
  <!-- 顶部导航 -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo-sm">LOGO</span>
      <span class="brand-name">公司内部系统</span>
    </div>
    <nav class="topbar-nav" id="topbar-nav">
      <a href="/chat.html" class="nav-ai-btn">🤖 AI 助手</a>
    </nav>
    <div class="topbar-right">
      <span class="user-name" id="user-name">加载中...</span>
      <button id="logout-btn" class="btn-logout">退出登录</button>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="dashboard-main">
    <div class="welcome-card">
      <h2>欢迎回来，<span id="welcome-name">...</span></h2>
      <p>这是您的仪表板首页，查看使用情况和快捷入口。</p>
      <a href="/chat.html" class="welcome-cta"><span class="cta-icon">🤖</span> 进入 AI 助手</a>
    </div>

    <!-- 统计卡片行 -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card">
        <div class="stat-icon stat-icon-calls">&#x1f4ac;</div>
        <div class="stat-body">
          <div class="stat-value" id="stat-remaining">-</div>
          <div class="stat-label">今日剩余调用</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon-model">&#x1f916;</div>
        <div class="stat-body">
          <div class="stat-value" id="stat-model">未使用</div>
          <div class="stat-label">最近使用模型</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon-date">&#x1f4c5;</div>
        <div class="stat-body">
          <div class="stat-value" id="stat-created">-</div>
          <div class="stat-label">注册时间</div>
        </div>
      </div>
    </div>

    <!-- 今日概况 -->
    <div class="stats-row" style="margin-top:20px;" id="stats-row-extra">
      <div class="stat-card">
        <div class="stat-icon stat-icon-calls">💬</div>
        <div class="stat-body">
          <div class="stat-value" id="stat-conversations">-</div>
          <div class="stat-label">今日对话数</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon-model">👥</div>
        <div class="stat-body">
          <div class="stat-value" id="stat-active-users">-</div>
          <div class="stat-label">今日活跃用户</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon-date">📊</div>
        <div class="stat-body">
          <div class="stat-value" id="stat-model-usage" style="font-size:13px;line-height:1.6;">-</div>
          <div class="stat-label">各模型调用次数</div>
        </div>
      </div>
    </div>

    <!-- 信息 + 公告 -->
    <div class="info-cards">
      <div class="info-card">
        <h3>用户信息</h3>
        <div class="info-item"><span class="label">用户名：</span><span id="info-name">-</span></div>
        <div class="info-item"><span class="label">工号：</span><span id="info-email">-</span></div>
        <div class="info-item"><span class="label">角色：</span><span id="info-role">-</span></div>
        <div class="info-item"><span class="label">最后登录：</span><span id="info-lastlogin">-</span></div>
        <button id="change-pwd-btn" class="btn-primary" style="margin-top:16px;width:100%;">修改密码</button>
      </div>
      <div class="info-card announcement-card">
        <h3>&#x1f4e2; 公告栏</h3>
        <p id="announcement-text" class="announcement-text">加载中...</p>
      </div>
    </div>

    <!-- 快捷操作 -->
    <div class="info-cards" style="margin-top:20px;">
      <div class="info-card quick-action quick-action-ai" onclick="window.location.href='/chat.html'">
        <span class="card-badge">🔥 热门</span>
        <h3>🤖 AI 助手</h3>
        <p>与 AI 智能助手对话，生成图片、编辑图片、智能问答</p>
        <span class="card-arrow">&rarr;</span>
      </div>
      <div class="info-card quick-action" onclick="window.location.href='/admin.html'" id="admin-entry" style="display:none;">
        <h3>用户管理</h3>
        <p>管理所有用户账号，启用/禁用用户，重置密码</p>
        <span class="card-arrow">&rarr;</span>
      </div>
      <div class="info-card quick-action" id="change-pwd-card">
        <h3>账号安全</h3>
        <p>定期修改密码，保护账号安全</p>
        <span class="card-arrow">&rarr;</span>
      </div>
    </div>
  </main>

  <!-- AI 助手浮动快捷按钮 -->
  <a href="/chat.html" class="fab-ai" title="进入 AI 助手">
    🤖
    <span class="fab-tooltip">AI 助手</span>
  </a>

  <!-- 修改密码弹窗 -->
  <div class="modal-overlay" id="pwd-modal">
    <div class="modal">
      <h3>修改密码</h3>
      <form id="change-pwd-form">
        <label>旧密码</label>
        <input type="password" id="old-pwd" placeholder="请输入旧密码" required autofocus>

        <label>新密码</label>
        <input type="password" id="new-pwd" placeholder="请输入新密码（至少6位）" required minlength="6">

        <label>确认新密码</label>
        <input type="password" id="confirm-pwd" placeholder="请再次输入新密码" required minlength="6">

        <div id="pwd-error" class="error"></div>
        <div id="pwd-success" class="success"></div>
        <div class="modal-buttons">
          <button type="button" id="cancel-pwd-btn" class="btn-secondary">取消</button>
          <button type="submit" class="btn-primary">确认修改</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');

    if (!token) {
      window.location.href = '/login.html';
    }

    async function loadDashboard() {
      try {
        // 并行请求
        const [meRes, usageRes, statsRes] = await Promise.all([
          fetch('/api/me', { headers: { 'Authorization': token } }),
          fetch('/api/usage/remaining', { headers: { 'Authorization': token } }),
          fetch('/api/stats', { headers: { 'Authorization': token } }).catch(() => null)
        ]);

        // 处理 /api/me
        if (!meRes.ok) {
          localStorage.clear();
          window.location.href = '/login.html';
          return;
        }
        const meData = await meRes.json();
        const user = meData.user;

        // 顶部导航
        document.getElementById('user-name').textContent = user.username;
        document.getElementById('welcome-name').textContent = user.username;

        if (user.role === 'admin') {
          document.getElementById('topbar-nav').innerHTML =
            '<a href="/chat.html" class="nav-ai-btn">🤖 AI 助手</a>' +
            '<a href="/admin.html" class="nav-link">用户管理</a>';
          document.getElementById('admin-entry').style.display = 'block';
        }

        // 用户信息卡片
        document.getElementById('info-name').textContent = user.username;
        document.getElementById('info-email').textContent = user.employeeId || '-';
        document.getElementById('info-role').textContent = user.role === 'admin' ? '管理员' : '普通用户';
        document.getElementById('info-lastlogin').textContent = user.lastLogin || '首次登录';

        // 公告
        document.getElementById('announcement-text').textContent = meData.announcement;

        // 最近使用模型
        const lastModel = meData.lastModel;
        document.getElementById('stat-model').textContent = lastModel || '暂无记录';

        // 注册时间
        if (user.createdAt) {
          const d = new Date(user.createdAt.replace(' ', 'T') + '+08:00');
          document.getElementById('stat-created').textContent =
            d.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
        } else {
          document.getElementById('stat-created').textContent = '-';
        }

        // 剩余调用次数
        if (usageRes.ok) {
          const usageData = await usageRes.json();
          if (usageData.success) {
            const el = document.getElementById('stat-remaining');
            const r = usageData.remaining;
            const limit = usageData.limit;
            el.textContent = `${r} / ${limit}`;
            if (r <= 5) el.style.color = 'var(--error)';
            else if (r <= 15) el.style.color = 'var(--accent)';
          }
        }

        // 统计数据
        if (statsRes && statsRes.ok) {
          const statsData = await statsRes.json();
          if (statsData.success) {
            document.getElementById('stat-conversations').textContent = statsData.todayConversations;
            document.getElementById('stat-active-users').textContent = statsData.todayActiveUsers;
            const modelEntries = Object.entries(statsData.modelUsage);
            document.getElementById('stat-model-usage').innerHTML =
              modelEntries.length > 0
                ? modelEntries.map(([k, v]) => `<span>${k}: <b>${v}</b></span>`).join('<br>')
                : '暂无数据';
          }
        }
      } catch (err) {
        console.error('加载仪表板失败', err);
      }
    }

    loadDashboard();

    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.clear();
      window.location.href = '/login.html';
    });

    // ---------- 修改密码 ----------
    const modal = document.getElementById('pwd-modal');
    const openModal = () => {
      modal.classList.add('show');
      document.getElementById('old-pwd').focus();
    };
    const closeModal = () => {
      modal.classList.remove('show');
      document.getElementById('change-pwd-form').reset();
      document.getElementById('pwd-error').textContent = '';
      document.getElementById('pwd-success').textContent = '';
    };

    document.getElementById('change-pwd-btn').addEventListener('click', openModal);
    document.getElementById('change-pwd-card').addEventListener('click', openModal);
    document.getElementById('cancel-pwd-btn').addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    document.getElementById('change-pwd-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('pwd-error');
      const successEl = document.getElementById('pwd-success');
      errorEl.textContent = '';
      successEl.textContent = '';

      const oldPassword = document.getElementById('old-pwd').value;
      const newPassword = document.getElementById('new-pwd').value;
      const confirmPwd = document.getElementById('confirm-pwd').value;

      if (newPassword !== confirmPwd) {
        errorEl.textContent = '两次输入的新密码不一致';
        return;
      }

      const res = await fetch('/api/change-password', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': token },
        body: JSON.stringify({ oldPassword, newPassword })
      });

      const data = await res.json();

      if (data.success) {
        successEl.textContent = data.message;
        setTimeout(closeModal, 1500);
      } else {
        errorEl.textContent = data.message;
      }
    });
  </script>
</body>
</html>
